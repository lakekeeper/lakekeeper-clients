name: Java CI

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "java/**"
      - ".github/workflows/java-ci.yml"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('java/gradle/wrapper/gradle-wrapper.properties', 'java/**/*.gradle.kts') }}
          restore-keys: gradle-
      - name: Build and test
        working-directory: java
        run: ./gradlew build --no-daemon
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: java/**/build/reports/tests/
