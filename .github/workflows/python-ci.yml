name: python-ci

on:
  push:
    branches: [main]
    paths: ["python/**", ".github/workflows/python-ci.yml"]
  pull_request:
    paths: ["python/**", ".github/workflows/python-ci.yml"]

defaults:
  run:
    working-directory: python

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the supported floor and a current version.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        run: mypy
      - name: Unit tests (+ coverage + JUnit report)
        # Integration tests are marked `integration` and deselected here (see pyproject addopts).
        run: |
          mkdir -p reports
          pytest tests/ -q \
            --cov=pylakekeeper --cov-report=term-missing --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit-unit.xml
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: python/reports/

  integration:
    # Full stack (Lakekeeper + Postgres + MinIO + Keycloak) via docker compose, real OAuth.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Integration tests (+ JUnit report)
        # ubuntu-latest ships docker + compose v2; conftest auto-detects the `docker` binary.
        run: |
          mkdir -p reports
          pytest tests/integration -m integration -q --junitxml=reports/junit-integration.xml
      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-integration
          path: python/reports/
