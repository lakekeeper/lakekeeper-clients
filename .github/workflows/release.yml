name: 🚀 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create releases / upload assets
  pull-requests: write # release-please maintains the release PR

jobs:
  # Maintains a release PR from conventional commits; on merge it tags + creates the release.
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    if: github.repository == 'lakekeeper/lakekeeper-clients'
    outputs:
      python_release_created: ${{ steps.release.outputs['python--release_created'] }}
      python_tag_name: ${{ steps.release.outputs['python--tag_name'] }}
      java_release_created: ${{ steps.release.outputs['java--release_created'] }}
      java_tag_name: ${{ steps.release.outputs['java--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PLEASE_RELEASE_LK_C }}
          config-file: release-please/release-please-config.json
          manifest-file: release-please/.release-please-manifest.json

  # Runs only when a python release was just created (i.e. the release PR was merged).
  publish-python:
    name: Publish pylakekeeper to PyPI
    needs: release-please
    if: needs.release-please.outputs.python_release_created == 'true'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/pylakekeeper
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing (no API token needed)
      contents: write # attach built artifacts to the GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
      - name: Attach artifacts to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.python_tag_name }}
          files: python/dist/*

  publish-java:
    name: Publish lakekeeper-client-java to GitHub Packages
    needs: release-please
    if: needs.release-please.outputs.java_release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('java/gradle/wrapper/gradle-wrapper.properties', 'java/**/*.gradle.kts') }}
      - name: Build and test
        working-directory: java
        run: ./gradlew build :examples:flink:shadowJar --no-daemon
      - name: Publish to GitHub Packages
        working-directory: java
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --no-daemon
      - name: Attach JARs to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.java_tag_name }}
          files: |
            java/core/build/libs/*.jar
            java/spark/build/libs/*.jar
            java/examples/flink/build/libs/*-all.jar
